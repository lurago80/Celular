{% extends 'base.html' %}

{% block title %}Página não encontrada (404){% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-sm border-0">
                <div class="card-body py-5">
                    <i class="bi bi-search text-warning" style="font-size: 5rem;"></i>
                    <h1 class="display-1 fw-bold text-warning mt-2">404</h1>
                    <h3 class="mb-3">Página não encontrada</h3>
                    <p class="text-muted mb-4">
                        A página que você tentou acessar não existe ou foi removida.<br>
                        {% if exception %}
                            <small class="text-danger">{{ exception }}</small>
                        {% endif %}
                    </p>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="javascript:history.back()" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Voltar
                        </a>
                        <a href="{% url 'core:dashboard' %}" class="btn btn-primary">
                            <i class="bi bi-house"></i> Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
